name: Build Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label (leave empty to use current date, e.g., 2026.5.18)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  pre-check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Always build on manual dispatch
        id: check
        run: echo "should_build=true" >> $GITHUB_OUTPUT

  build:
    needs: pre-check
    if: needs.pre-check.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: Linux-x64
          - platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            name: Linux-arm64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            name: Linux-musl-x64
          - platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-musl
            name: Linux-musl-arm64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [ -z "${INPUT_VERSION}" ]; then
            INPUT_VERSION="$(date +%Y.%-m.%-d)"
          fi
          echo "version=${INPUT_VERSION}" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install admin-ui dependencies
        working-directory: admin-ui
        run: pnpm install --frozen-lockfile

      - name: Build admin-ui
        working-directory: admin-ui
        run: pnpm build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-cache-${{ matrix.target }}"
          cache-on-failure: true

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Set version in Cargo.toml
        shell: bash
        run: sed -i "s/^version = .*/version = \"${{ steps.version.outputs.version }}\"/" Cargo.toml

      - name: Build app
        run: cargo build --release --target ${{ matrix.target }} ${{ contains(matrix.target, 'musl') && '--no-default-features' || '' }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kiro-rs-${{ steps.version.outputs.version }}-${{ matrix.name }}
          if-no-files-found: error
          compression-level: 6
          path: |
            target/${{ matrix.target }}/release/kiro-rs
            target/${{ matrix.target }}/release/kiro-rs.exe